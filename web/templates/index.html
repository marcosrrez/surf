<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>surf — search that learns</title>
<link rel="stylesheet" href="/static/style.css?v=8">
</head>
<body>
<div id="app">

  <div id="rail-backdrop" onclick="closeRail()"></div>

  <!-- Rail -->
  <aside id="rail">
    <div id="rail-header">
      <svg width="26" height="11" viewBox="0 0 26 11" fill="none" style="overflow:visible">
        <path d="M0,6 C3,1 6,1 9,6 S15,11 18,6 S24,2 26,6" stroke="var(--accent)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      </svg>
      <span id="rail-brand">surf</span>
      <button id="rail-collapse" onclick="toggleRail()" title="collapse">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="2.5" width="13" height="11" rx="2" stroke="currentColor" stroke-width="1.3"/><line x1="6" y1="2.5" x2="6" y2="13.5" stroke="currentColor" stroke-width="1.3"/></svg>
      </button>
    </div>

    <div id="rail-new-wrap">
      <button id="rail-new-btn" onclick="newSearch()">
        <span>+ new search</span>
        <span id="rail-new-kbd">⌘K</span>
      </button>
    </div>

    <div id="rail-scroll">
      <div class="rail-section-label">THE VAULT</div>
      <div id="tag-list"></div>
      <div class="rail-section-label">HISTORY</div>
      <div id="thread-list"></div>
    </div>

    <div id="rail-footer">
      <span id="rail-footer-text">no account<br>local only</span>
      <button class="theme-btn" id="rail-theme-btn" onclick="toggleTheme()">☀ light</button>
    </div>
  </aside>

  <!-- Main -->
  <main id="main">

    <!-- Empty state -->
    <div id="empty-state">
      <div id="empty-topchrome">
        <button id="hamburger-btn" onclick="toggleRail()" style="background:transparent;border:1px solid var(--border);border-radius:8px;cursor:pointer;padding:7px;color:var(--dim);display:flex;transition:all .15s ease">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="2.5" width="13" height="11" rx="2" stroke="currentColor" stroke-width="1.3"/><line x1="6" y1="2.5" x2="6" y2="13.5" stroke="currentColor" stroke-width="1.3"/></svg>
        </button>
      </div>

      <div id="empty-center">
        <div id="hero-wave-wrap">
          <svg width="100%" height="54" viewBox="0 0 720 54" fill="none" preserveAspectRatio="none">
            <defs>
              <linearGradient id="wv1" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0" stop-color="var(--accent)" stop-opacity="0"/>
                <stop offset="0.5" stop-color="var(--accent)" stop-opacity="1"/>
                <stop offset="1" stop-color="var(--accent)" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <path d="M0,33 C45,9 90,9 135,33 S225,57 270,33 S360,9 405,33 S495,57 540,33 S630,9 675,33 S715,40 720,33" stroke="url(#wv1)" stroke-width="2.2" fill="none" stroke-linecap="round"/>
            <path d="M0,38 C45,18 90,18 135,38 S225,58 270,38 S360,18 405,38 S495,58 540,38 S630,18 675,38 S715,43 720,38" stroke="url(#wv1)" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.4"/>
          </svg>
        </div>

        <h1 id="hero-title">surf</h1>
        <p id="hero-sub">search that learns</p>

        <div id="search-wrap">
          <div id="search-box" class="input-box">
            <textarea id="query" placeholder="ask anything — code, news, research…" autocomplete="off" autofocus rows="1"></textarea>
          </div>
          <div id="suggest-drop" class="hidden"></div>
        </div>

      </div>
    </div>

    <!-- Results state -->
    <div id="results-state" class="hidden">
      <div id="topbar">
        <div id="topbar-left">
          <button id="topbar-hamburger" onclick="toggleRail()" class="hidden">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="2.5" width="13" height="11" rx="2" stroke="currentColor" stroke-width="1.3"/><line x1="6" y1="2.5" x2="6" y2="13.5" stroke="currentColor" stroke-width="1.3"/></svg>
          </button>
          <div id="topbar-brand" style="display:none">
            <svg width="22" height="9" viewBox="0 0 26 11" fill="none">
              <path d="M0,6 C3,1 6,1 9,6 S15,11 18,6 S24,2 26,6" stroke="var(--accent)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
            </svg>
            <span>surf</span>
          </div>
        </div>
        <button class="topbar-btn" onclick="newSearch()">+ new</button>
      </div>

      <div id="results-inner">
        <div id="timeline"></div>
        <div id="followup-bar" class="hidden">
          <div id="followup-box" class="input-box">
            <textarea id="followup-input" placeholder="ask a follow-up…" rows="1" style="font-size:15px"></textarea>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
/* ── Theme ──────────────────────────────────────────────── */

var isDark = localStorage.getItem('surf_theme') !== 'light';

function applyTheme() {
  document.documentElement.classList.toggle('light', !isDark);
  var label = isDark ? '☀ light' : '☾ dark';
  var el = document.getElementById('rail-theme-btn');
  if (el) el.textContent = label;
}

function toggleTheme() {
  isDark = !isDark;
  localStorage.setItem('surf_theme', isDark ? 'dark' : 'light');
  applyTheme();
}

/* ── Rail ───────────────────────────────────────────────── */

var railOpen = localStorage.getItem('surf_rail') !== 'closed';

function applyRail() {
  var isMobile = window.innerWidth < 760;
  var rail = document.getElementById('rail');

  rail.classList.toggle('mobile', isMobile);
  rail.classList.toggle('closed', !railOpen);
  document.getElementById('rail-backdrop').classList.toggle('visible', isMobile && railOpen);

  var showHamburger = isMobile || !railOpen;
  var hBtn = document.getElementById('hamburger-btn');
  var tHBtn = document.getElementById('topbar-hamburger');
  var brand = document.getElementById('topbar-brand');
  var topChrome = document.getElementById('empty-topchrome');

  if (hBtn) hBtn.style.display = showHamburger ? 'flex' : 'none';
  if (tHBtn) tHBtn.classList.toggle('hidden', !showHamburger);
  if (brand) brand.style.display = showHamburger ? 'flex' : 'none';
  if (topChrome) topChrome.style.display = showHamburger ? 'flex' : 'none';
}

function toggleRail() {
  railOpen = !railOpen;
  if (window.innerWidth >= 760) localStorage.setItem('surf_rail', railOpen ? 'open' : 'closed');
  applyRail();
}

function closeRail() {
  railOpen = false;
  applyRail();
}

window.addEventListener('resize', applyRail);

/* ── State ──────────────────────────────────────────────── */

var searchHistory = JSON.parse(localStorage.getItem('surf_history') || '[]');
var activeTag = null;
var vaultNotesCache = {};
var cardCounter = 0;
var activeCardId = null;
var currentEvtSource = null;
var suggestActive = -1;

/* ── Utility ────────────────────────────────────────────── */

function escapeHtml(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function formatTime(ts) {
  var d = new Date(ts), now = new Date();
  var h = d.getHours(), m = d.getMinutes().toString().padStart(2, '0');
  var ampm = h >= 12 ? 'pm' : 'am', h12 = h % 12 || 12;
  if (d.toDateString() === now.toDateString()) return h12 + ':' + m + ampm;
  var yesterday = new Date(now); yesterday.setDate(yesterday.getDate() - 1);
  if (d.toDateString() === yesterday.toDateString()) return 'yesterday';
  return (d.getMonth() + 1) + '/' + d.getDate();
}

function getDateGroup(ts) {
  var d = new Date(ts), now = new Date();
  if (d.toDateString() === now.toDateString()) return 'today';
  var yesterday = new Date(now); yesterday.setDate(yesterday.getDate() - 1);
  if (d.toDateString() === yesterday.toDateString()) return 'yesterday';
  return 'earlier';
}

/* ── Markdown rendering ─────────────────────────────────── */

function renderMarkdown(raw, sources) {
  var html = raw
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^▸ TL;DR\s*/m, '<span class="tldr-marker">TL;DR</span>  ')
    .replace(/^• /gm, '<span class="bullet">&bull;</span> ')
    .replace(/\[(\d+)\]/g, function(match, num) {
      var idx = parseInt(num) - 1;
      if (idx >= 0 && idx < sources.length) {
        var s = sources[idx];
        var short = s.domain.replace(/^www\./, '').replace(/\.com$|\.org$|\.net$/, '');
        return '<span class="cite-chip" onclick="window.open(\'' + escapeHtml(s.url) + '\',\'_blank\')" title="' + escapeHtml(s.title) + '">' + escapeHtml(short) + '</span>';
      }
      return match;
    })
    .replace(/\[([a-zA-Z][a-zA-Z0-9._-]*)\]/g, function(match, name) {
      var s = sources.find(function(src) { return src.domain.toLowerCase().includes(name.toLowerCase()); });
      if (s) return '<span class="cite-chip" onclick="window.open(\'' + escapeHtml(s.url) + '\',\'_blank\')" title="' + escapeHtml(s.title) + '">' + escapeHtml(name) + '</span>';
      return match;
    })
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
  return '<p>' + html + '</p>';
}

/* ── Suggestions ────────────────────────────────────────── */

var SUGGEST_POOL = [
  "what's happening in the world right now",
  "latest AI research papers 2026",
  "CVEs in nginx",
  "how do CRDTs actually work",
  "best practices for Rust async",
  "compare postgres vs sqlite for a side project",
  "what is a vector database"
];

/* History-first: past searches surface immediately, pool fills remaining slots */
function getSuggestions(v) {
  var s = (v || '').toLowerCase().trim();
  if (!s || s.length < 2) return [];

  var histMatches = searchHistory
    .filter(function(h) { return h.query && h.query.toLowerCase().includes(s); })
    .slice(0, 4)
    .map(function(h) { return { text: h.query, fromHistory: true }; });

  return histMatches;
}

/* smart suggestions from DDG via surf backend — debounced, merged with history */
var _suggestTimer = null;
var _suggestCache = {};

function fetchSmartSuggestions(val) {
  var s = val.trim();
  if (!s || s.length < 2) return;

  if (_suggestCache[s]) { mergeSmartSuggestions(val, _suggestCache[s]); return; }

  clearTimeout(_suggestTimer);
  _suggestTimer = setTimeout(function() {
    fetch('/api/suggest?q=' + encodeURIComponent(s))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var items = (data.suggestions || []).map(function(t) { return { text: t, fromHistory: false }; });
        _suggestCache[s] = items;
        mergeSmartSuggestions(val, items);
      })
      .catch(function() {});
  }, 180);
}

function mergeSmartSuggestions(val, smartItems) {
  var drop = document.getElementById('suggest-drop');
  if (drop.classList.contains('hidden')) return; /* user moved on */

  var histItems = getSuggestions(val);
  var histTexts = new Set(histItems.map(function(x) { return x.text.toLowerCase(); }));
  var extra = smartItems.filter(function(x) { return !histTexts.has(x.text.toLowerCase()); });
  var merged = histItems.concat(extra).slice(0, 6);
  if (!merged.length) return;

  drop.innerHTML = '';
  merged.forEach(function(sg, i) {
    var btn = document.createElement('button');
    btn.className = 'suggest-row' + (i === suggestActive ? ' active' : '');
    btn.innerHTML = (sg.fromHistory ? ICON_HISTORY : ICON_SEARCH) + '<span>' + escapeHtml(sg.text) + '</span>';
    btn.addEventListener('pointerdown', function(e) { e.preventDefault(); pickSuggest(sg.text); });
    btn.addEventListener('mouseenter', function() { suggestActive = i; drop.querySelectorAll('.suggest-row').forEach(function(b, j) { b.className = 'suggest-row' + (j === i ? ' active' : ''); }); });
    drop.appendChild(btn);
  });
  drop.classList.remove('hidden');
}

var ICON_HISTORY = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" style="flex:0 0 auto;color:var(--accent);opacity:.8"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4"/><polyline points="8,5 8,8 10,10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
var ICON_SEARCH = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" style="flex:0 0 auto;opacity:.45"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.4"/><line x1="10.8" y1="10.8" x2="14" y2="14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>';

function renderSuggestions(val) {
  var drop = document.getElementById('suggest-drop');
  var suggs = getSuggestions(val);
  if (!suggs.length) { drop.classList.add('hidden'); return; }
  drop.innerHTML = '';
  suggs.forEach(function(sg, i) {
    var btn = document.createElement('button');
    btn.className = 'suggest-row' + (i === suggestActive ? ' active' : '');
    btn.innerHTML = (sg.fromHistory ? ICON_HISTORY : ICON_SEARCH) + '<span>' + escapeHtml(sg.text) + '</span>';
    btn.addEventListener('pointerdown', function(e) { e.preventDefault(); pickSuggest(sg.text); });
    btn.addEventListener('mouseenter', function() { suggestActive = i; renderSuggestions(val); });
    drop.appendChild(btn);
  });
  drop.classList.remove('hidden');
}

function hideSuggestions() {
  document.getElementById('suggest-drop').classList.add('hidden');
  suggestActive = -1;
}

function pickSuggest(q) {
  document.getElementById('query').value = q;
  hideSuggestions();
  doSearch(new Event('submit'));
}

/* ── Chips ──────────────────────────────────────────────── */


/* ── Sidebar tags ───────────────────────────────────────── */

async function loadSidebarTags() {
  try {
    var resp = await fetch('/api/tags');
    var data = await resp.json();
    var list = document.getElementById('tag-list');
    list.innerHTML = '';
    var tags = data.tags || {};
    Object.entries(tags).slice(0, 15).forEach(function(entry) {
      var name = entry[0], count = entry[1];
      var btn = document.createElement('button');
      btn.className = 'rail-tag' + (activeTag === name ? ' active' : '');
      btn.addEventListener('click', function() { filterByTag(name); });
      btn.innerHTML = '<span class="rail-tag-name"># ' + escapeHtml(name) + '</span><span class="rail-tag-count">' + count + '</span>';
      list.appendChild(btn);
    });
  } catch(e) {}
}

async function filterByTag(tag) {
  if (activeTag === tag) {
    activeTag = null;
    loadSidebarTags();
    renderThreadList();
    return;
  }
  activeTag = tag;
  loadSidebarTags();
  if (!vaultNotesCache[tag]) {
    try {
      var resp = await fetch('/api/vault-notes?tag=' + encodeURIComponent(tag));
      var data = await resp.json();
      vaultNotesCache[tag] = data.notes || [];
    } catch(e) { vaultNotesCache[tag] = []; }
  }
  renderThreadList();
}

/* ── Thread list ────────────────────────────────────────── */

function renderThreadList() {
  var container = document.getElementById('thread-list');
  container.innerHTML = '';

  if (activeTag && vaultNotesCache[activeTag] && vaultNotesCache[activeTag].length) {
    var lbl = document.createElement('div');
    lbl.className = 'rail-group-label';
    lbl.textContent = 'vault · #' + activeTag;
    container.appendChild(lbl);
    vaultNotesCache[activeTag].forEach(function(note) {
      addThreadItem(container, note.query, true, function() {
        document.getElementById('query').value = note.query;
        doSearch(new Event('submit'));
        if (window.innerWidth < 760) closeRail();
      });
    });
  }

  var items = searchHistory;
  if (activeTag) items = items.filter(function(h) { return h.query && h.query.toLowerCase().includes(activeTag.toLowerCase()); });

  var groups = { today: [], yesterday: [], earlier: [] };
  items.forEach(function(h) { var g = getDateGroup(h.time); (groups[g] || groups.earlier).push(h); });

  ['today', 'yesterday', 'earlier'].forEach(function(group) {
    if (!groups[group].length) return;
    var lbl = document.createElement('div');
    lbl.className = 'rail-group-label';
    lbl.textContent = group;
    container.appendChild(lbl);
    groups[group].forEach(function(h) {
      addThreadItem(container, h.query, false, function() {
        loadCachedOrSearch(h.query);
        if (window.innerWidth < 760) closeRail();
      });
    });
  });
}

function addThreadItem(container, text, isVault, onClick) {
  var btn = document.createElement('button');
  btn.className = 'rail-thread';
  btn.addEventListener('click', onClick);
  if (isVault) {
    var dot = document.createElement('span');
    dot.className = 'vault-dot';
    dot.textContent = '◆';
    btn.appendChild(dot);
  }
  var label = document.createElement('span');
  label.className = 'rail-thread-text';
  label.textContent = text;
  btn.appendChild(label);
  container.appendChild(btn);
}

/* ── History ────────────────────────────────────────────── */

function addToHistory(query, data) {
  searchHistory = searchHistory.filter(function(h) { return h.query !== query; });
  searchHistory.unshift({
    query: query,
    sources: data.sources || [],
    commentary: data.commentary || [],
    answer: data.answer || '',
    intent: data.intent || {},
    time: Date.now()
  });
  searchHistory = searchHistory.slice(0, 50);
  localStorage.setItem('surf_history', JSON.stringify(searchHistory));
  renderThreadList();
}

function getCachedResult(query) {
  var entry = searchHistory.find(function(h) { return h.query === query; });
  if (!entry || !entry.answer) return null;
  var age = Date.now() - entry.time;
  var tier = (entry.intent && entry.intent.tier) || 'snippet';
  if (tier === 'current' && age > 10 * 60 * 1000) return null;
  if (age > 24 * 60 * 60 * 1000) return null;
  return entry;
}

function loadCachedOrSearch(query) {
  var cached = getCachedResult(query);
  if (cached) { renderCachedCard(cached); }
  else { document.getElementById('query').value = query; doSearch(new Event('submit')); }
}

/* ── View switching ─────────────────────────────────────── */

function showEmptyState() {
  document.getElementById('empty-state').classList.remove('hidden');
  document.getElementById('results-state').classList.add('hidden');
}

function showResultsState() {
  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('results-state').classList.remove('hidden');
  applyRail();
}

/* ── Card creation ──────────────────────────────────────── */

function createCard(query) {
  cardCounter++;
  var cardId = 'card-' + cardCounter;

  var card = document.createElement('div');
  card.className = 'research-card';
  card.id = cardId;

  var body = document.createElement('div');
  body.className = 'card-body';

  if (cardCounter === 1) {
    var headline = document.createElement('div');
    headline.className = 'card-query-headline';
    headline.textContent = query;
    body.appendChild(headline);
  } else {
    var echo = document.createElement('div');
    echo.className = 'followup-echo';
    var lbl = document.createElement('span');
    lbl.className = 'followup-label';
    lbl.textContent = '↳ follow-up';
    var qtxt = document.createElement('span');
    qtxt.className = 'followup-query';
    qtxt.textContent = query;
    echo.appendChild(lbl);
    echo.appendChild(qtxt);
    card.appendChild(echo);
  }

  var status = document.createElement('div');
  status.className = 'card-status';
  status.id = cardId + '-status';
  status.textContent = 'surfing the web…';

  var intentDiv = document.createElement('div');
  intentDiv.className = 'card-intent hidden';
  intentDiv.id = cardId + '-intent';

  var sourcesDiv = document.createElement('div');
  sourcesDiv.className = 'card-sources hidden';
  sourcesDiv.id = cardId + '-sources';

  var readDiv = document.createElement('div');
  readDiv.className = 'card-read hidden';
  readDiv.id = cardId + '-read';
  readDiv.dataset.readCount = '0';

  var vaultDiv = document.createElement('div');
  vaultDiv.className = 'card-vault hidden';
  vaultDiv.id = cardId + '-vault';

  var answerDiv = document.createElement('div');
  answerDiv.className = 'card-answer';
  answerDiv.id = cardId + '-answer';

  var actionsDiv = document.createElement('div');
  actionsDiv.className = 'card-actions hidden';
  actionsDiv.id = cardId + '-actions';

  body.appendChild(status);
  body.appendChild(intentDiv);
  body.appendChild(sourcesDiv);
  body.appendChild(readDiv);
  body.appendChild(vaultDiv);
  body.appendChild(answerDiv);
  body.appendChild(actionsDiv);
  card.appendChild(body);

  document.getElementById('timeline').appendChild(card);
  activeCardId = cardId;
  return cardId;
}

/* ── Card sub-renderers ─────────────────────────────────── */

function renderCardIntent(cardId, intent) {
  var div = document.getElementById(cardId + '-intent');
  if (!div) return;
  div.classList.remove('hidden');
  div.innerHTML = '';
  [intent.tier, intent.domain, intent.answer_depth].filter(Boolean).forEach(function(label) {
    var badge = document.createElement('span');
    badge.className = 'intent-badge';
    badge.textContent = label;
    div.appendChild(badge);
  });
}

function renderCardSources(cardId, sources) {
  var panel = document.getElementById(cardId + '-sources');
  if (!panel) return;
  panel.classList.remove('hidden');
  panel.innerHTML = '';
  sources.forEach(function(s, i) {
    var q = s.composite || 0.5;
    var qLabel = q >= 0.85 ? 'high' : q >= 0.65 ? 'solid' : 'fair';
    var qColor = q >= 0.8 ? 'var(--green)' : q >= 0.6 ? 'var(--yellow)' : 'var(--red)';
    var card = document.createElement('div');
    card.className = 'source-card';
    card.innerHTML =
      '<div class="source-header">' +
        '<span class="source-num">' + String(i + 1).padStart(2, '0') + '</span>' +
        '<span class="source-domain">' + escapeHtml(s.domain) + '</span>' +
        '<a class="source-ext" href="' + escapeHtml(s.url) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">↗</a>' +
      '</div>' +
      '<div class="source-title">' + escapeHtml(s.title) + '</div>' +
      '<div class="source-bar"><div class="source-bar-fill" style="width:' + Math.round(q * 100) + '%;background:' + qColor + '"></div></div>' +
      '<div class="source-foot">' +
        '<span class="source-meta" style="color:' + qColor + '">' + qLabel + '</span>' +
        '<span class="source-read">read →</span>' +
      '</div>';
    var _px, _py;
    card.addEventListener('pointerdown', function(e) { _px = e.clientX; _py = e.clientY; });
    card.addEventListener('pointerup', function(e) {
      if (Math.abs(e.clientX - _px) < 8 && Math.abs(e.clientY - _py) < 8) {
        openReader(s.url, s.title, s.domain);
      }
    });
    panel.appendChild(card);
  });
}

function ensureReadHeader(cardId) {
  var div = document.getElementById(cardId + '-read');
  if (!div) return null;
  div.classList.remove('hidden');
  if (!div.querySelector('.read-header')) {
    var header = document.createElement('div');
    header.className = 'read-header';
    header.innerHTML =
      '<svg width="18" height="8" viewBox="0 0 26 11" fill="none"><path d="M0,6 C3,1 6,1 9,6 S15,11 18,6 S24,2 26,6" stroke="var(--accent)" stroke-width="1.4" fill="none" stroke-linecap="round"/></svg>' +
      '<span class="read-label">THE READ</span>' +
      '<span class="read-live-dot">· reading…</span>';
    var lines = document.createElement('div');
    lines.className = 'read-lines';
    div.appendChild(header);
    div.appendChild(lines);
  }
  return div.querySelector('.read-lines');
}

function addReadLine(cardId, text) {
  /* Don't add lines once collapsed */
  var div = document.getElementById(cardId + '-read');
  if (!div || div.dataset.collapsed === '1') return;

  var lines = ensureReadHeader(cardId);
  if (!lines) return;

  var line = document.createElement('div');
  line.className = 'read-line';
  line.innerHTML = '<span class="read-arrow">↳</span><span class="read-text">' + escapeHtml(text) + '</span>';
  lines.appendChild(line);
  div.dataset.readCount = String(parseInt(div.dataset.readCount || '0') + 1);
}

function collapseRead(cardId) {
  var div = document.getElementById(cardId + '-read');
  if (!div || div.dataset.collapsed === '1') return;
  div.dataset.collapsed = '1';

  var allLines = Array.from(div.querySelectorAll('.read-line')).map(function(l) {
    return l.querySelector('.read-text').textContent;
  });
  var count = allLines.length;
  if (!count) { div.classList.add('hidden'); return; }

  div.innerHTML = '';

  var btn = document.createElement('button');
  btn.className = 'read-collapse-btn';
  btn.innerHTML =
    '<svg width="16" height="7" viewBox="0 0 26 11" fill="none"><path d="M0,6 C3,1 6,1 9,6 S15,11 18,6 S24,2 26,6" stroke="var(--dim)" stroke-width="1.4" fill="none" stroke-linecap="round"/></svg>' +
    '<span class="read-label">THE READ</span>' +
    '<span class="read-collapse-meta">· ' + count + ' notes ▸</span>';

  var expandable = document.createElement('div');
  expandable.className = 'read-expandable hidden';
  expandable.id = cardId + '-read-exp';
  allLines.forEach(function(text) {
    var row = document.createElement('div');
    row.className = 'read-line';
    row.innerHTML = '<span class="read-arrow">↳</span><span class="read-text">' + escapeHtml(text) + '</span>';
    expandable.appendChild(row);
  });

  btn.addEventListener('click', function() {
    var isOpen = !expandable.classList.contains('hidden');
    expandable.classList.toggle('hidden', isOpen);
    btn.querySelector('.read-collapse-meta').textContent = '· ' + count + ' notes ' + (isOpen ? '▸' : '▾');
  });

  div.appendChild(btn);
  div.appendChild(expandable);
}

function renderCardActions(cardId, answerText, intent, vaultTags) {
  var actions = document.getElementById(cardId + '-actions');
  if (!actions) return;
  actions.classList.remove('hidden');
  actions.innerHTML = '';

  var left = document.createElement('div');
  left.className = 'actions-left';
  if (vaultTags && vaultTags.length) {
    var saved = document.createElement('span');
    saved.className = 'vault-saved';
    saved.textContent = '↳ saved to vault · ' + vaultTags.map(function(t) { return '#' + t; }).join(' ');
    left.appendChild(saved);
  }

  var right = document.createElement('div');
  right.className = 'actions-right';

  var copyBtn = document.createElement('button');
  copyBtn.className = 'action-btn';
  copyBtn.innerHTML =
    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>' +
    '<span>⧉ copy</span>';
  copyBtn.addEventListener('click', function() {
    var text = (answerText || '').replace(/\*\*/g, '').replace(/▸ TL;DR\s*/, 'TL;DR: ');
    navigator.clipboard.writeText(text).then(function() {
      copyBtn.querySelector('span').textContent = '✓ copied';
      setTimeout(function() { copyBtn.querySelector('span').textContent = '⧉ copy'; }, 1500);
    });
  });
  right.appendChild(copyBtn);

  actions.appendChild(left);
  actions.appendChild(right);
}

/* ── Render cached card ─────────────────────────────────── */

function renderCachedCard(entry) {
  showResultsState();

  var cardId = createCard(entry.query);
  var sources = entry.sources || [];
  var commentary = entry.commentary || [];

  document.getElementById(cardId + '-status').classList.add('hidden');

  if (entry.intent && entry.intent.tier) renderCardIntent(cardId, entry.intent);
  if (sources.length) renderCardSources(cardId, sources);

  if (commentary.length) {
    commentary.forEach(function(c) {
      addReadLine(cardId, c.domain + (c.comment ? ' — ' + c.comment : ''));
    });
    collapseRead(cardId);
  }

  if (entry.answer) {
    document.getElementById(cardId + '-answer').innerHTML = renderMarkdown(entry.answer, sources);
  }

  var tags = entry.intent ? [entry.intent.tier, entry.intent.domain].filter(Boolean) : [];
  renderCardActions(cardId, entry.answer, entry.intent, tags);

  document.getElementById('followup-bar').classList.remove('hidden');
  document.getElementById('followup-input').focus();
}

/* ── Search ─────────────────────────────────────────────── */

function doSearch(e, forceFresh) {
  if (e) e.preventDefault();
  var q = document.getElementById('query').value.trim();
  if (!q) return;

  hideSuggestions();
  showResultsState();
  document.getElementById('followup-bar').classList.add('hidden');

  if (!forceFresh) {
    var cached = getCachedResult(q);
    if (cached) { renderCachedCard(cached); return; }
  }

  if (currentEvtSource) { currentEvtSource.close(); currentEvtSource = null; }

  var cardId = createCard(q);
  var answerBuffer = '', currentSources = [], currentIntent = {};
  var readCount = 0;
  var answerStarted = false;

  var evtSource = new EventSource('/api/search?q=' + encodeURIComponent(q) + (forceFresh ? '&fresh=true' : ''));
  currentEvtSource = evtSource;

  evtSource.onmessage = function(event) {
    var data = JSON.parse(event.data);
    var statusEl = document.getElementById(cardId + '-status');

    switch (data.type) {
      case 'status':
        if (statusEl) { statusEl.textContent = data.content; statusEl.classList.remove('hidden'); }
        break;

      case 'intent':
        currentIntent = data.content;
        renderCardIntent(cardId, currentIntent);
        if (statusEl) statusEl.textContent = currentIntent.tier + ' · ' + currentIntent.domain;
        break;

      case 'sources':
        currentSources = data.content;
        renderCardSources(cardId, currentSources);
        break;

      case 'vault':
        var vEl = document.getElementById(cardId + '-vault');
        if (vEl) {
          vEl.classList.remove('hidden');
          vEl.textContent = '↳ drawing from ' + data.content.count + ' vault note' + (data.content.count !== 1 ? 's' : '');
        }
        break;

      case 'reading':
        if (statusEl) statusEl.classList.add('hidden');
        var r = data.content;
        addReadLine(cardId, r.domain + (r.comment ? ' — ' + r.comment : ''));
        readCount++;
        break;

      case 'token':
        if (!answerStarted) {
          answerStarted = true;
          if (statusEl) statusEl.classList.add('hidden');
          if (readCount > 0) collapseRead(cardId);
        }
        answerBuffer += data.content;
        var ansEl = document.getElementById(cardId + '-answer');
        if (ansEl) ansEl.innerHTML = renderMarkdown(answerBuffer, currentSources);
        break;

      case 'error':
        if (statusEl) {
          statusEl.textContent = data.content;
          statusEl.classList.remove('hidden');
          statusEl.style.animation = 'none';
          statusEl.style.color = 'var(--red)';
        }
        evtSource.close(); currentEvtSource = null;
        break;

      case 'done':
        evtSource.close(); currentEvtSource = null;
        if (statusEl) statusEl.classList.add('hidden');
        document.getElementById('followup-bar').classList.remove('hidden');
        document.getElementById('followup-input').focus();
        var doneData = data.content || {};
        var tags = [doneData.tier || currentIntent.tier, doneData.domain || currentIntent.domain].filter(Boolean);
        renderCardActions(cardId, answerBuffer, currentIntent, tags);
        addToHistory(q, { sources: currentSources, commentary: [], answer: answerBuffer, intent: currentIntent });
        break;
    }
  };

  evtSource.onerror = function() { evtSource.close(); currentEvtSource = null; };
}

/* ── Follow-up ──────────────────────────────────────────── */

function doFollowup(e) {
  if (e) e.preventDefault();
  var followup = document.getElementById('followup-input').value.trim();
  if (!followup) return;
  document.getElementById('query').value = followup;
  document.getElementById('followup-input').value = '';
  autoGrow(document.getElementById('followup-input'));
  doSearch(null);
}

/* ── New search / reset ─────────────────────────────────── */

function newSearch() {
  if (currentEvtSource) { currentEvtSource.close(); currentEvtSource = null; }
  document.getElementById('timeline').innerHTML = '';
  document.getElementById('query').value = '';
  document.getElementById('followup-input').value = '';
  cardCounter = 0;
  activeCardId = null;
  showEmptyState();
  setTimeout(function() { document.getElementById('query').focus(); }, 60);
}

/* ── Input focus styling ────────────────────────────────── */

function setupInputBox(boxEl) {
  var textarea = boxEl.querySelector('textarea');
  if (!textarea) return;
  textarea.addEventListener('focus', function() { boxEl.classList.add('focused'); });
  textarea.addEventListener('blur', function() { boxEl.classList.remove('focused'); });
  textarea.addEventListener('input', function() { autoGrow(textarea); });
}

/* ── Auto-grow textarea ─────────────────────────────────── */

function autoGrow(el) {
  if (!el || el.scrollHeight === 0) return; /* skip when hidden */
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

/* ── Query textarea wiring ──────────────────────────────── */

var queryEl = document.getElementById('query');

queryEl.addEventListener('input', function(e) {
  autoGrow(e.target);
  renderSuggestions(e.target.value);
  fetchSmartSuggestions(e.target.value);
});

queryEl.addEventListener('focus', function() {
  renderSuggestions(queryEl.value);
  fetchSmartSuggestions(queryEl.value);
});

queryEl.addEventListener('blur', function() {
  setTimeout(hideSuggestions, 150);
});

queryEl.addEventListener('keydown', function(e) {
  var drop = document.getElementById('suggest-drop');
  var suggs = getSuggestions(queryEl.value);
  var showing = !drop.classList.contains('hidden') && suggs.length;
  if (e.key === 'ArrowDown' && showing) { e.preventDefault(); suggestActive = Math.min(suggs.length - 1, suggestActive + 1); renderSuggestions(queryEl.value); return; }
  if (e.key === 'ArrowUp' && showing) { e.preventDefault(); suggestActive = Math.max(-1, suggestActive - 1); renderSuggestions(queryEl.value); return; }
  if (e.key === 'Escape') { hideSuggestions(); return; }
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (showing && suggestActive >= 0 && suggs[suggestActive]) pickSuggest(suggs[suggestActive].text);
    else doSearch(e);
  }
});

/* ── Followup textarea wiring ───────────────────────────── */

var followupEl = document.getElementById('followup-input');
followupEl.addEventListener('input', function(e) { autoGrow(e.target); });
followupEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doFollowup(e); }
});

/* ── ⌘K new search ──────────────────────────────────────── */

document.addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); newSearch(); }
});

/* ── Init ───────────────────────────────────────────────── */

applyTheme();
applyRail();
setupInputBox(document.getElementById('search-box'));
setupInputBox(document.getElementById('followup-box'));
loadSidebarTags();
renderThreadList();
</script>

<!-- ── Article Reader Panel ───────────────────────────── -->
<div id="reader-overlay" onclick="closeReader()"></div>
<div id="reader-panel" role="dialog" aria-modal="true" aria-label="Article reader">
  <div id="reader-header">
    <span id="reader-domain"></span>
    <span id="reader-read-time"></span>
    <a id="reader-external" target="_blank" rel="noopener noreferrer">↗ open</a>
    <button id="reader-close" onclick="closeReader()" aria-label="Close reader">×</button>
  </div>
  <div id="reader-body">
    <div id="reader-loading">
      <svg width="28" height="11" viewBox="0 0 26 11" fill="none">
        <path d="M0,6 C3,1 6,1 9,6 S15,11 18,6 S24,2 26,6" stroke="var(--accent)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      </svg>
      fetching article…
    </div>
    <h1 id="reader-title"></h1>
    <div id="reader-content"></div>
  </div>
</div>

<script>
/* ── Article Reader ──────────────────────────────────────── */

var readerOpen = false;

function renderArticle(raw) {
  if (!raw) return '';

  function inline(s) {
    return escapeHtml(s)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`(.+?)`/g, '<code>$1</code>');
  }

  /* ── 1. Clean noise ──────────────────────────────────── */
  var text = raw
    .replace(/skip to( main)? content/gi, ' ')
    .replace(/\[([^\]]*)\]\([^)]*\)/g, '$1')   /* [text](url) → text */
    .replace(/https?:\/\/\S+/g, '')             /* bare URLs */
    .replace(/[ \t]{2,}/g, ' ')
    .trim();

  /* ── 2. Determine line/block format ─────────────────── */
  var allLines = text.split('\n');
  var nonEmpty = allLines.filter(function(l) { return l.trim().length > 0; });
  var blankCount = allLines.length - nonEmpty.length;
  var hasParagraphBreaks = blankCount / (allLines.length || 1) >= 0.08;

  var blocks;
  if (hasParagraphBreaks) {
    /* Double-newline format: join lines within each block */
    blocks = text.split(/\n{2,}/).map(function(b) {
      return b.split('\n').map(function(l) { return l.trim(); }).filter(Boolean).join(' ').replace(/\s+/g, ' ').trim();
    }).filter(Boolean);
  } else {
    /* Block/stream format: each non-empty line is its own unit */
    blocks = nonEmpty.map(function(l) { return l.trim(); }).filter(function(l) { return l.length > 3; });
  }

  /* ── 3. Sentence splitter for long runs ─────────────── */
  function splitSentences(str) {
    /* Split at ". ", "! ", "? " when followed by uppercase or quote */
    var marked = str.replace(/([.!?])\s+(?=[A-Z"'“‘])/g, '$1\n');
    return marked.split('\n').map(function(s) { return s.trim(); }).filter(Boolean);
  }

  function paragraphsFromSentences(sentences, perPara) {
    var out = [];
    for (var i = 0; i < sentences.length; i += perPara) {
      out.push(sentences.slice(i, i + perPara).join(' '));
    }
    return out;
  }

  /* ── 4. Render each block ────────────────────────────── */
  var html = '';
  var noiseWords = /^(advertisement|share|tweet|facebook|sign (in|up)|log in|subscribe|cookie notice|©|all rights reserved|menu|navigation|home|next|prev|tags:|related:)$/i;

  blocks.forEach(function(block, idx) {
    var b = block;
    if (!b || b.length < 4) return;
    if (noiseWords.test(b.trim())) return;

    /* Markdown H1/H2 */
    var m2 = b.match(/^#{1,2}\s+(.+)/);
    if (m2) { html += '<h2>' + inline(m2[1]) + '</h2>'; return; }

    /* Markdown H3+ */
    var m3 = b.match(/^#{3,}\s+(.+)/);
    if (m3) { html += '<h3>' + inline(m3[1]) + '</h3>'; return; }

    /* Blockquote */
    if (/^>\s+/.test(b)) {
      html += '<blockquote>' + inline(b.replace(/^>\s+/, '')) + '</blockquote>';
      return;
    }

    /* Unordered list */
    if (/^[-*+]\s+/.test(b)) {
      html += '<ul><li>' + inline(b.replace(/^[-*+]\s+/, '')) + '</li></ul>';
      return;
    }

    /* Ordered list */
    if (/^\d+[.)]\s+/.test(b)) {
      html += '<ol><li>' + inline(b.replace(/^\d+[.)]\s+/, '')) + '</li></ol>';
      return;
    }


    /* Horizontal rule */
    if (/^[-_*]{3,}$/.test(b)) { html += '<hr>'; return; }

    /* Heading heuristic: short, no terminal sentence punctuation, ≤ 10 words */
    var wordCount = b.trim().split(/\s+/).length;
    if (idx > 0 && b.length <= 80 && wordCount <= 10 && !/[.,;!?]$/.test(b) && !/^\d/.test(b) && !/^http/.test(b)) {
      html += '<h3>' + inline(b) + '</h3>';
      return;
    }

    /* Long block: split into sentences, group 3 per paragraph */
    if (b.length > 320) {
      var sents = splitSentences(b);
      if (sents.length > 1) {
        paragraphsFromSentences(sents, 3).forEach(function(p) {
          if (p.length > 20) html += '<p>' + inline(p) + '</p>';
        });
        return;
      }
    }

    /* Regular paragraph */
    if (b.length >= 20) html += '<p>' + inline(b) + '</p>';
  });

  /* Merge consecutive list elements so numbering is continuous */
  html = html.replace(/<\/ol>\s*<ol>/g, '');
  html = html.replace(/<\/ul>\s*<ul>/g, '');

  return html;
}

function openReader(url, title, domain) {
  var overlay  = document.getElementById('reader-overlay');
  var panel    = document.getElementById('reader-panel');
  var domEl    = document.getElementById('reader-domain');
  var titleEl  = document.getElementById('reader-title');
  var contentEl= document.getElementById('reader-content');
  var loadEl   = document.getElementById('reader-loading');
  var timeEl   = document.getElementById('reader-read-time');
  var extEl    = document.getElementById('reader-external');

  /* reset */
  domEl.textContent   = domain;
  titleEl.textContent = title || '';
  titleEl.style.display = 'none';
  contentEl.innerHTML = '';
  loadEl.style.display = 'flex';
  timeEl.textContent  = '';
  extEl.href          = url;

  /* open */
  overlay.classList.add('open');
  panel.classList.add('open');
  readerOpen = true;
  document.body.style.overflow = 'hidden';

  /* fetch */
  fetch('/api/article?url=' + encodeURIComponent(url))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      loadEl.style.display = 'none';
      titleEl.style.display = '';

      if (data.error || !data.content) {
        titleEl.textContent = title || domain;
        contentEl.innerHTML =
          '<p style="color:var(--dim)">This page couldn\'t be fetched inline.</p>' +
          '<p><a href="' + escapeHtml(url) + '" target="_blank" style="color:var(--accent)">Open in browser ↗</a></p>';
        return;
      }

      titleEl.textContent = data.title || title;

      /* read time */
      var words = data.content.trim().split(/\s+/).length;
      var mins  = Math.max(1, Math.round(words / 230));
      timeEl.textContent = mins + ' min read';

      /* render content */
      contentEl.innerHTML = renderArticle(data.content);

      /* remove duplicate title if content starts with the same text */
      var firstEl = contentEl.firstElementChild;
      if (firstEl && data.title) {
        var tLow = data.title.trim().toLowerCase();
        var fLow = firstEl.textContent.trim().toLowerCase();
        if (fLow === tLow || tLow.includes(fLow) || fLow.includes(tLow)) {
          firstEl.remove();
        }
      }

      /* scroll to top */
      document.getElementById('reader-body').scrollTop = 0;
    })
    .catch(function() {
      loadEl.style.display = 'none';
      titleEl.style.display = '';
      titleEl.textContent = title || domain;
      contentEl.innerHTML =
        '<p style="color:var(--dim)">Could not load article.</p>' +
        '<p><a href="' + escapeHtml(url) + '" target="_blank" style="color:var(--accent)">Open in browser ↗</a></p>';
    });
}

function closeReader() {
  document.getElementById('reader-overlay').classList.remove('open');
  document.getElementById('reader-panel').classList.remove('open');
  document.body.style.overflow = '';
  readerOpen = false;
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && readerOpen) closeReader();
});
</script>
</body>
