<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>surf — search that learns</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">
  <header id="hero" class="visible">
    <h1>surf</h1>
    <p class="tagline">search that learns</p>
    <div class="wave">~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~</div>
  </header>

  <div id="search-bar">
    <form id="search-form" onsubmit="doSearch(event)">
      <input type="text" id="query" placeholder="ask anything..." autocomplete="off" autofocus>
      <button type="submit" id="search-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
    </form>
  </div>

  <div id="results" class="hidden">
    <div id="status-line" class="hidden"></div>
    <div id="vault-line" class="hidden"></div>
    <div id="sources-panel" class="hidden"></div>
    <div id="answer-panel" class="hidden">
      <div id="answer"></div>
    </div>
  </div>
</div>

<script>
let currentController = null;

function doSearch(e) {
  e.preventDefault();
  const q = document.getElementById('query').value.trim();
  if (!q) return;

  // Collapse hero
  document.getElementById('hero').classList.remove('visible');
  document.getElementById('hero').classList.add('collapsed');

  // Reset panels
  const results = document.getElementById('results');
  results.classList.remove('hidden');
  document.getElementById('answer').innerHTML = '';
  document.getElementById('sources-panel').innerHTML = '';
  document.getElementById('sources-panel').classList.add('hidden');
  document.getElementById('vault-line').classList.add('hidden');
  document.getElementById('answer-panel').classList.add('hidden');

  const status = document.getElementById('status-line');
  status.textContent = 'understanding your intent...';
  status.classList.remove('hidden');

  // Cancel previous stream
  if (currentController) currentController.abort();
  currentController = new AbortController();

  const evtSource = new EventSource(`/api/search?q=${encodeURIComponent(q)}`);
  let answerStarted = false;

  evtSource.onmessage = function(event) {
    const data = JSON.parse(event.data);

    switch(data.type) {
      case 'status':
        status.textContent = data.content;
        status.classList.remove('hidden');
        break;

      case 'intent':
        const intent = data.content;
        status.textContent = `${intent.tier} · ${intent.domain} · ${intent.answer_depth}`;
        break;

      case 'sources':
        renderSources(data.content);
        break;

      case 'vault':
        const vault = data.content;
        const vaultLine = document.getElementById('vault-line');
        vaultLine.textContent = `↳ drawing from ${vault.count} vault note${vault.count !== 1 ? 's' : ''}`;
        vaultLine.classList.remove('hidden');
        break;

      case 'reading':
        const r = data.content;
        const q_class = r.quality >= 0.6 ? 'quality-high' : r.quality >= 0.4 ? 'quality-mid' : 'quality-low';
        status.innerHTML = `<span class="${q_class}">↳</span> reading ${r.domain}`;
        break;

      case 'token':
        if (!answerStarted) {
          answerStarted = true;
          status.classList.add('hidden');
          document.getElementById('answer-panel').classList.remove('hidden');
        }
        appendToken(data.content);
        break;

      case 'error':
        status.textContent = data.content;
        status.classList.remove('hidden');
        evtSource.close();
        break;

      case 'done':
        evtSource.close();
        break;
    }
  };

  evtSource.onerror = function() {
    evtSource.close();
  };
}

function renderSources(sources) {
  const panel = document.getElementById('sources-panel');
  panel.classList.remove('hidden');
  panel.innerHTML = sources.map((s, i) => {
    const q = s.composite;
    const bar_class = q >= 0.6 ? 'quality-high' : q >= 0.4 ? 'quality-mid' : 'quality-low';
    return `
      <a href="${s.url}" target="_blank" class="source-card">
        <div class="source-header">
          <span class="source-num">${i + 1}</span>
          <span class="source-domain">${s.domain}</span>
          <span class="quality-bar ${bar_class}" title="Quality: ${(q * 100).toFixed(0)}%">
            <span class="quality-fill" style="width: ${q * 100}%"></span>
          </span>
        </div>
        <div class="source-title">${s.title}</div>
      </a>
    `;
  }).join('');
}

function appendToken(token) {
  const answer = document.getElementById('answer');
  // Handle markdown-style formatting
  const text = document.createTextNode(token);
  answer.appendChild(text);
  // Auto-scroll
  answer.scrollTop = answer.scrollHeight;
}

// Enter key on input
document.getElementById('query').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch(e);
});
</script>
</body>
</html>
