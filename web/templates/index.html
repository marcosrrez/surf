<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>surf — search that learns</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">
  <header id="hero" class="visible">
    <div class="header-row">
      <h1 onclick="resetSearch()" style="cursor:pointer">surf</h1>
      <span id="new-search-btn" class="hidden" onclick="resetSearch()">+ new</span>
    </div>
    <p class="tagline">search that learns</p>
    <div class="wave"></div>
  </header>

  <div id="search-bar">
    <form id="search-form" onsubmit="doSearch(event)">
      <input type="text" id="query" placeholder="ask anything..." autocomplete="off" autofocus onfocus="renderHistory()">
      <button type="submit" id="search-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
    </form>
  </div>

  <div id="history-panel" class="hidden"></div>

  <div id="results" class="hidden">
    <div id="status-line" class="hidden"></div>
    <div id="vault-line" class="hidden"></div>
    <div id="sources-panel" class="hidden"></div>
    <div id="answer-panel" class="hidden">
      <div id="commentary-trail" class="hidden"></div>
      <div id="answer"></div>
      <div id="answer-actions" class="hidden">
        <button onclick="copyAnswer()" class="action-btn" title="Copy answer">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          <span id="copy-label">copy</span>
        </button>
      </div>
    </div>
    <div id="followup-bar" class="hidden">
      <form onsubmit="doFollowup(event)">
        <input type="text" id="followup-input" placeholder="ask a follow-up..." autocomplete="off">
      </form>
    </div>
  </div>
</div>

<script>
let currentController = null;

function doSearch(e) {
  e.preventDefault();
  const q = document.getElementById('query').value.trim();
  if (!q) return;

  // Collapse hero, show new search button
  document.getElementById('hero').classList.remove('visible');
  document.getElementById('hero').classList.add('collapsed');
  document.getElementById('new-search-btn').classList.remove('hidden');
  document.getElementById('answer-actions').classList.add('hidden');

  // Reset panels
  const results = document.getElementById('results');
  results.classList.remove('hidden');
  document.getElementById('answer').innerHTML = '';
  document.getElementById('sources-panel').innerHTML = '';
  document.getElementById('sources-panel').classList.add('hidden');
  document.getElementById('vault-line').classList.add('hidden');
  document.getElementById('answer-panel').classList.add('hidden');
  document.getElementById('followup-bar').classList.add('hidden');
  document.getElementById('commentary-trail').classList.add('hidden');
  document.getElementById('commentary-trail').innerHTML = '';
  document.getElementById('history-panel').classList.add('hidden');
  answerBuffer = '';

  const status = document.getElementById('status-line');
  status.textContent = 'understanding your intent...';
  status.classList.remove('hidden');

  // Cancel previous stream
  if (currentController) currentController.abort();
  currentController = new AbortController();

  const evtSource = new EventSource(`/api/search?q=${encodeURIComponent(q)}`);
  let answerStarted = false;

  evtSource.onmessage = function(event) {
    const data = JSON.parse(event.data);

    switch(data.type) {
      case 'status':
        status.textContent = data.content;
        status.classList.remove('hidden');
        break;

      case 'intent':
        const intent = data.content;
        status.textContent = `${intent.tier} · ${intent.domain} · ${intent.answer_depth}`;
        break;

      case 'sources':
        renderSources(data.content);
        break;

      case 'vault':
        const vault = data.content;
        const vaultLine = document.getElementById('vault-line');
        vaultLine.textContent = `↳ drawing from ${vault.count} vault note${vault.count !== 1 ? 's' : ''}`;
        vaultLine.classList.remove('hidden');
        break;

      case 'reading':
        const r = data.content;
        const q_class = r.quality >= 0.6 ? 'quality-high' : r.quality >= 0.4 ? 'quality-mid' : 'quality-low';
        document.getElementById('answer-panel').classList.remove('hidden');
        const trail = document.getElementById('commentary-trail');
        trail.classList.remove('hidden');
        if (r.comment) {
          trail.innerHTML += `<div class="commentary-line"><span class="${q_class}">↳</span> ${r.domain} — <em>${r.comment}</em></div>`;
        } else {
          trail.innerHTML += `<div class="commentary-line"><span class="${q_class}">↳</span> reading ${r.domain}</div>`;
        }
        status.classList.add('hidden');
        break;

      case 'token':
        if (!answerStarted) {
          answerStarted = true;
          status.classList.add('hidden');
          document.getElementById('answer-panel').classList.remove('hidden');
        }
        appendToken(data.content);
        break;

      case 'error':
        status.textContent = data.content;
        status.classList.remove('hidden');
        evtSource.close();
        break;

      case 'done':
        evtSource.close();
        document.getElementById('followup-bar').classList.remove('hidden');
        document.getElementById('answer-actions').classList.remove('hidden');
        document.getElementById('followup-input').focus();
        const tldr = answerBuffer.split('\n')[0].replace(/▸ TL;DR\s*/, '').replace(/\*\*/g, '');
        addToHistory(document.getElementById('query').value, tldr);
        document.getElementById('history-panel').classList.add('hidden');
        break;
    }
  };

  evtSource.onerror = function() {
    evtSource.close();
  };
}

let currentSources = [];

function renderSources(sources) {
  currentSources = sources;
  const panel = document.getElementById('sources-panel');
  panel.classList.remove('hidden');
  panel.innerHTML = sources.map((s, i) => {
    const q = s.composite;
    const bar_class = q >= 0.6 ? 'quality-high' : q >= 0.4 ? 'quality-mid' : 'quality-low';
    return `
      <a href="${s.url}" target="_blank" class="source-card">
        <div class="source-header">
          <span class="source-num">${i + 1}</span>
          <span class="source-domain">${s.domain}</span>
          <span class="quality-bar ${bar_class}" title="Quality: ${(q * 100).toFixed(0)}%">
            <span class="quality-fill" style="width: ${q * 100}%"></span>
          </span>
        </div>
        <div class="source-title">${s.title}</div>
      </a>
    `;
  }).join('');
}

let answerBuffer = '';

function appendToken(token) {
  answerBuffer += token;
  const answer = document.getElementById('answer');
  let html = answerBuffer
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^▸ TL;DR\s*/m, '<span class="tldr-marker">▸ TL;DR</span>  ')
    .replace(/^• /gm, '<span class="bullet">•</span> ')
    .replace(/\[(\d+)\]/g, (match, num) => {
      const idx = parseInt(num) - 1;
      if (idx >= 0 && idx < currentSources.length) {
        const s = currentSources[idx];
        const shortDomain = s.domain.replace(/^www\./, '').replace(/\.com$|\.org$|\.net$/, '');
        return `<span class="cite-chip" onclick="window.open('${s.url}','_blank')" title="${s.title}">${shortDomain}</span>`;
      }
      return match;
    })
    .replace(/\[([a-zA-Z][a-zA-Z0-9._-]*)\]/g, (match, name) => {
      const s = currentSources.find(s => s.domain.toLowerCase().includes(name.toLowerCase()));
      if (s) {
        return `<span class="cite-chip" onclick="window.open('${s.url}','_blank')" title="${s.title}">${name}</span>`;
      }
      return match;
    })
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
  answer.innerHTML = '<p>' + html + '</p>';
  answer.scrollTop = answer.scrollHeight;
}

let searchHistory = JSON.parse(localStorage.getItem('surf_history') || '[]');

function resetSearch() {
  document.getElementById('hero').classList.add('visible');
  document.getElementById('hero').classList.remove('collapsed');
  document.getElementById('new-search-btn').classList.add('hidden');
  document.getElementById('results').classList.add('hidden');
  document.getElementById('query').value = '';
  document.getElementById('query').focus();
  renderHistory();
}

function addToHistory(query, tldr) {
  searchHistory = searchHistory.filter(h => h.query !== query);
  searchHistory.unshift({ query, tldr: tldr.substring(0, 120), time: Date.now() });
  searchHistory = searchHistory.slice(0, 20);
  localStorage.setItem('surf_history', JSON.stringify(searchHistory));
}

function renderHistory() {
  const panel = document.getElementById('history-panel');
  if (!panel) return;
  if (searchHistory.length === 0) {
    panel.classList.add('hidden');
    return;
  }
  panel.classList.remove('hidden');
  panel.innerHTML = '<div class="history-label">recent</div>';
  searchHistory.slice(0, 5).forEach((h, i) => {
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `<span class="history-query">${escapeHtml(h.query)}</span><span class="history-tldr">${escapeHtml(h.tldr)}</span>`;
    item.addEventListener('click', () => {
      document.getElementById('query').value = h.query;
      doSearch(new Event('submit'));
    });
    panel.appendChild(item);
  });
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function copyAnswer() {
  const text = answerBuffer.replace(/\*\*/g, '').replace(/▸ TL;DR\s*/, 'TL;DR: ');
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('copy-label').textContent = 'copied';
    setTimeout(() => document.getElementById('copy-label').textContent = 'copy', 2000);
  });
}

function doFollowup(e) {
  e.preventDefault();
  const followup = document.getElementById('followup-input').value.trim();
  if (!followup) return;
  document.getElementById('query').value = followup;
  document.getElementById('followup-input').value = '';
  doSearch(e);
}

// Enter key on input
document.getElementById('query').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch(e);
});

// Show history on load
renderHistory();
</script>
</body>
</html>
